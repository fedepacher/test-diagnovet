services:
  database:
    image: mysql:latest
    ports:
      - 3306:3306
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}_${RUN_ENV}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    networks:
      va_network:
        aliases:
          - database

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - database
    environment:
      RUN_ENV: ${RUN_ENV}

      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}

      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      SECRET_KEY: ${SECRET_KEY}

      DEPLOYMENT_SERVICE: ${DEPLOYMENT_SERVICE}

      LOG_FILE: ${LOG_FILE}

      CORS_ORIGINS: ${CORS_ORIGINS}
      UPLOAD_DIR: ${UPLOAD_DIR}

    networks:
      va_network:
        aliases:
          - api

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      API_BASE: ${API_BASE}
      WAKE_UP_RETRIES: ${WAKE_UP_RETRIES}
      WAKE_UP_DELAY: ${WAKE_UP_DELAY}
      WAKE_UP_TIMEOUT: ${WAKE_UP_TIMEOUT}
    networks:
      va_network:
        aliases:
          - frontend

networks:
  va_network:
    name: va_network


